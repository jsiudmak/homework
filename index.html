    <!DOCTYPE html>
<!--
  Program name: Medical Form
Author: Julian C Siudmak
Date Created: 2/20/2026
Date Last edited: 2/27/2026
Version: 1.0
Description: This is a medical form for a ficional doctors office that will take patients personal and medical information.
-->


  
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Medical Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="logo-header.svg" alt="sable bioclinic">

        
    </header>

  <h1>New Patient Registration</h1>
    <p id="datetime" align="left"></p>
    
  <p>Fields marked with * are required</p>

  <form>

    
    <h2>Account Setup</h2>
    <fieldset>
      <label for="userID">* Desired User ID</label>
      <input type="text" id="userID" name="userID">

      <label for="email">* Email Address</label>
      <input type="text" id="email" name="email">

      <label for="password">* Password</label>
      <input type="password" id="password" required onkeyup="checkPasswordMatch();">

      <label for="confirm_password">* Re-enter Password</label>
      <input type="password" id="confirm_password" required onkeyup="checkPasswordMatch();">
    </fieldset>

    
    <h2>Demographics and Contact</h2>
    <fieldset>

      <label for="fname">* First Name</label>
      <input type="text" id="fname" name="fname" placeholder="Jane">

      <label for="mname">Middle Initial</label>
      <input type="text" id="mname" name="mname">

      <label for="lname">* Last Name</label>
      <input type="text" id="lname" name="lname" placeholder="Doe">

      <label for="dob">* Date of Birth</label>
      <input type="date" id="dob" name="dob">

      <label for="ssn">* Social Security Number</label>
      <input type="text" id="ssn" name="ssn">

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone">

      <label for="aline1">* Address Line 1</label>
      <input type="text" id="aline1" name="aline1">

      <label for="aline2">Address Line 2</label>
      <input type="text" id="aline2" name="aline2">

      <label for="city">* City</label>
      <input type="text" id="city" name="city">

      <label for="state">* State</label>
      <select id="state" name="state">
        <option value="">-- Select State --</option>
        <option value="AL">AL - Alabama</option>
        <option value="AK">AK - Alaska</option>
        <option value="AZ">AZ - Arizona</option>
        <option value="AR">AR - Arkansas</option>
        <option value="CA">CA - California</option>
        <option value="CO">CO - Colorado</option>
        <option value="CT">CT - Connecticut</option>
        <option value="DE">DE - Delaware</option>
        <option value="FL">FL - Florida</option>
        <option value="GA">GA - Georgia</option>
        <option value="HI">HI - Hawaii</option>
        <option value="ID">ID - Idaho</option>
        <option value="IL">IL - Illinois</option>
        <option value="IN">IN - Indiana</option>
        <option value="IA">IA - Iowa</option>
        <option value="KS">KS - Kansas</option>
        <option value="KY">KY - Kentucky</option>
        <option value="LA">LA - Louisiana</option>
        <option value="ME">ME - Maine</option>
        <option value="MD">MD - Maryland</option>
        <option value="MA">MA - Massachusetts</option>
        <option value="MI">MI - Michigan</option>
        <option value="MN">MN - Minnesota</option>
        <option value="MS">MS - Mississippi</option>
        <option value="MO">MO - Missouri</option>
        <option value="MT">MT - Montana</option>
        <option value="NE">NE - Nebraska</option>
        <option value="NV">NV - Nevada</option>
        <option value="NH">NH - New Hampshire</option>
        <option value="NJ">NJ - New Jersey</option>
        <option value="NM">NM - New Mexico</option>
        <option value="NY">NY - New York</option>
        <option value="NC">NC - North Carolina</option>
        <option value="ND">ND - North Dakota</option>
        <option value="OH">OH - Ohio</option>
        <option value="OK">OK - Oklahoma</option>
        <option value="OR">OR - Oregon</option>
        <option value="PA">PA - Pennsylvania</option>
        <option value="RI">RI - Rhode Island</option>
        <option value="SC">SC - South Carolina</option>
        <option value="SD">SD - South Dakota</option>
        <option value="TN">TN - Tennessee</option>
        <option value="TX">TX - Texas</option>
        <option value="UT">UT - Utah</option>
        <option value="VT">VT - Vermont</option>
        <option value="VA">VA - Virginia</option>
        <option value="WA">WA - Washington</option>
        <option value="WV">WV - West Virginia</option>
        <option value="WI">WI - Wisconsin</option>
        <option value="WY">WY - Wyoming</option>
      </select>

      <label for="zip">* Zip Code</label>
      <input type="text" id="zip" name="zip">

      <label>* Sex</label>
      <div class="radio-group">
        <input type="radio" id="male" name="sex" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="sex" value="female">
        <label for="female">Female</label>
      </div>

    </fieldset>

    
    <h2>Enhancement Intake and Health Information</h2>
    <fieldset>
        <label for="pain">Current pain level</label>
        <input id="pain" class="range" type="range" min="1" max="10" value="4">


        
      <label>Consent</label>
      <div class="checkbox-group">
        <input type="checkbox" id="consent" name="consent">
        <label for="consent">I confirm the information above is accurate to the best of my knowledge.</label>
      </div>
    </fieldset>
      
    <button type="reset">Clear and start over</button>
    <button type="submit">Submit Form</button>

  </form>

  <footer>
      <img src="logo-footer.svg" alt="sable bioclinic">
      <p class="address">123 Mulberry St.<br>Houston, TX 77070</p>
      <p>Connect with us</p>
        <a href="https://www.instagram.com/hire_bauer/?hl=en">Instagram</a>
  
  
  
  </footer>

</body>
    <script>
        var dt = new Date();
        document.getElementById("datetime").innerHTML = dt;
    </script>
</html>
