<!DOCTYPE html>
<!--

Author: Julian C Siudmak
Date Created: 2/20/2026
Date Last edited: 2/20/2026
Version: 1.0
Description: This is a medical form for a ficional doctors office that will take patients personal and medical information.
-->


<html lang="en">

  
<head>
  <meta charset="UTF-8">
  <title>Medical Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>New Patient Registration</h1>
  <p>Fields marked with * are required</p>
  <h2> Account setup</h2>

  <h2> Demographics and contact</h2>

  <h2>Enhacment intake and health information</h2>
    
  <form>

    <fieldset>
      <legend>Patient Information</legend>
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Jane Doe">

      <label for="dob">Date of Birth</label>
      <input type="date" id="dob" name="dob">

      <label for="gender">Gender</label>
      <select id="gender" name="gender">
        <option value="">-- Select --</option>
        <option>Male</option>
        <option>Female</option>
        <option>Non-binary</option>
        <option>Prefer not to say</option>
      </select>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone">
    </fieldset>

    <fieldset>
      <legend>Medical History</legend>
      <label for="conditions">Current Conditions</label>
      <textarea id="conditions" name="conditions" rows="3" placeholder="e.g. diabetes, hypertension"></textarea>

      <label for="allergies">Known Allergies</label>
      <textarea id="allergies" name="allergies" rows="2" placeholder="e.g. penicillin, latex"></textarea>
    </fieldset>

    <fieldset>
      <legend>Current Medications</legend>
      <label for="medications">List Medications (name, dose, frequency)</label>
      <textarea id="medications" name="medications" rows="3" placeholder="e.g. Metformin 500mg twice daily"></textarea>
    </fieldset>

    <fieldset>
      <legend>Consent</legend>
      <label>
        <input type="checkbox" name="consent"> I confirm the information above is accurate to the best of my knowledge.
      </label>
    </fieldset>

    <button type="submit">Submit Form</button>

  </form>
</body>
</html>
