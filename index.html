Description: This is a medical form for a ficional doctors office that will take patients personal and medical information.
-->


<html lang="en">

  
<head>
  <meta charset="UTF-8">
  <title>Medical Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>New Patient Registration</h1>
  <p>Fields marked with * are required</p>
  <h2> Account setup</h2>
    <form>
      <fieldset>
        <legend>* Desired user ID</legend>
      <label>
        <input type="text" id="userID" name="userID">
      </label>

        <legend>* Email address</legend>
      <label>
        <input type="text" id="email" name="email">
      </label>

      <legend> * password </legend>
        <label>
        <input type ="password" id="password" name="password">
        </label>
      <legend>* Reenter password</legend>    
      
        
    </fieldset>
  

  <h2> Demographics and contact</h2>

  <h2>Enhacment intake and health information</h2>
  <form>
  <fieldset>
      <legend>Consent</legend>
      <label>
        <input type="checkbox" name="consent"> I confirm the information above is accurate to the best of my knowledge.
      </label>
    </fieldset>
  </form>
    
  <form>

    <fieldset>
      <legend>Patient Information</legend>
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Jane Doe">

      <label for="dob">Date of Birth</label>
      <input type="date" id="dob" name="dob">

      <label for="gender">Gender</label>
      <select id="gender" name="gender">
        <option value="">-- Select --</option>
        <option>Male</option>
        <option>Female</option>
        <option>Non-binary</option>
        <option>Prefer not to say</option>
      </select>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone">
    </fieldset>

   
    

    <button type="submit">Submit Form</button>

  </form>
</body>
</html>
