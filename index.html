Description: This is a medical form for a ficional doctors office that will take patients personal and medical information.

<html lang="en">

  
<head>
  <meta charset="UTF-8">
  <title>Medical Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>New Patient Registration</h1>
  <p>Fields marked with * are required</p>
  <h2> Account setup</h2>
    <form>
      <fieldset>
        <legend>* Desired user ID</legend>
      <label>
        <input type="text" id="userID" name="userID">
      </label>

        <legend>* Email address</legend>
      <label>
        <input type="text" id="email" name="email">
      </label>
        
          <legend>Password</legend>
        <label for="password"></label>
        <input type="password" id="password" required onkeyup="checkPasswordMatch();">

        <legend>Re-enter password:</legend>
        <label for="confirm_password"></label>
        <input type="password" id="confirm_password" required onkeyup="checkPasswordMatch();">
      
        
    </fieldset>
  

  <h2> Demographics and contact</h2>

      <fieldset>
      <legend>Patient Information</legend>
      <label for="name">* First Name</label>
      <input type="text" id="fname" name="fname" placeholder="Jane">
      
      <label for="name">Middle Initial</label>
      <input type="text" id="mname" name="mname" >
        
      <label for="name">* Last Name</label>
      <input type="text" id="lname" name="lname" placeholder="Doe">
      

      <label for="dob">Date of Birth</label>
      <input type="date" id="dob" name="dob">

      <input type="radio" id="male" name="sex" value="male">
      <label for="male">Male</label>

      <input type="radio" id="female" name="sex" value="female">
      <label for="female">Female</label>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone">
   

  <h2>Enhacment intake and health information</h2>
  <form>
  <fieldset>
      <legend>Consent</legend>
      <label>
        <input type="checkbox" name="consent"> I confirm the information above is accurate to the best of my knowledge.
      </label>
    </fieldset>
  </form>
    
  <form>
    </fieldset>

   
    

    <button type="submit">Submit Form</button>

  </form>
</body>


  <footer>
    Sable BioClinic
</footer>
</html>
